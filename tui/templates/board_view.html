<div class="boards-wrap">
    <div class="board-view-header">
        <a href="/boards" class="back-link">← Tous les boards</a>
        <h2>%%BOARD_NAME%%</h2>
        <span class="board-actions">
            <button class="wiki-btn-cancel" onclick="openAddColumn()" style="font-size:12px;padding:6px 12px">+ Colonne</button>
        </span>
    </div>
    <div class="board-columns" id="boardColumns">
        %%BOARD_COLUMNS%%
        <button class="board-add-col-btn" onclick="openAddColumn()">+ Ajouter une colonne</button>
    </div>
</div>
<style>%%BOARD_CSS%%</style>
<script>
var dragCardId = null, dragColId = null;
function allowDrop(e) { e.preventDefault(); e.currentTarget.closest('.board-col').classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.closest('.board-col').classList.remove('drag-over'); }
document.addEventListener('dragstart', function(e) {
    var item = e.target.closest('.board-card-item');
    if (!item) return;
    dragCardId = item.dataset.cardId;
    dragColId = item.dataset.colId;
    item.classList.add('dragging');
});
document.addEventListener('dragend', function(e) {
    document.querySelectorAll('.board-card-item.dragging').forEach(function(el) { el.classList.remove('dragging'); });
    document.querySelectorAll('.board-col.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
});
function drop(e) {
    e.preventDefault();
    var col = e.currentTarget.closest('.board-col');
    if (!col || !dragCardId) return;
    var targetColId = col.dataset.colId;
    if (targetColId === dragColId) { document.querySelectorAll('.board-col.drag-over').forEach(function(el) { el.classList.remove('drag-over'); }); return; }
    fetch('/api/board/%%BOARD_ID%%/move', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({card_id:dragCardId, from_col:dragColId, to_col:targetColId})
    }).then(function(r){return r.json()}).then(function(d){if(d.success) location.reload();});
    document.querySelectorAll('.board-col.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
}
function openModal(html) {
    var m = document.getElementById('boardModal');
    m.innerHTML = html;
    m.className = 'board-modal-bg show';
}
function closeModal() { document.getElementById('boardModal').className = 'board-modal-bg'; }
function openAddCard(colId) {
    openModal(`
        <div class="board-modal">
            <h3>Nouvelle carte</h3>
            <form onsubmit="return addCard(event,'${colId}')">
                <label>Titre</label>
                <input type="text" name="title" required placeholder="Titre de la carte" autofocus>
                <label>Description</label>
                <textarea name="description" placeholder="Description (optionnel)"></textarea>
                <label>Assigné à</label>
                <input type="text" name="assignee" placeholder="Nom (optionnel)">
                <label>Étiquettes</label>
                <div class="label-picker" id="labelPicker">${
                    ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#6366f1','#ec4899','#78716c'].map(function(c){
                        return '<div class="lp-item" style="background:'+c+'" onclick="this.classList.toggle(\'selected\')" data-color="'+c+'"></div>';
                    }).join('')
                }</div>
                <div class="modal-btns">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-primary">Créer</button>
                </div>
            </form>
        </div>
    `);
}
function addCard(e, colId) {
    e.preventDefault();
    var fd = new FormData(e.target);
    var labels = Array.from(document.querySelectorAll('#labelPicker .lp-item.selected')).map(function(el){return el.dataset.color});
    var data = {board_id:'%%BOARD_ID%%', col_id:colId, title:fd.get('title'), description:fd.get('description'), assignee:fd.get('assignee'), labels:labels};
    fetch('/api/board/%%BOARD_ID%%/cards', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
        .then(function(r){return r.json()})
        .then(function(d){if(d.success) location.reload(); else alert(d.error);});
    return false;
}
function editCard(colId, cardId) {
    fetch('/api/board/%%BOARD_ID%%/card?col_id='+colId+'&card_id='+cardId)
        .then(function(r){return r.json()})
        .then(function(c) {
            openModal(`
                <div class="board-modal">
                    <h3>Éditer la carte</h3>
                    <form onsubmit="return saveCard(event,'${colId}','${cardId}')">
                        <label>Titre</label>
                        <input type="text" name="title" value="${c.title.replace(/"/g,'&quot;')}" required>
                        <label>Description</label>
                        <textarea name="description">${(c.description||'').replace(/"/g,'&quot;')}</textarea>
                        <label>Assigné à</label>
                        <input type="text" name="assignee" value="${(c.assignee||'').replace(/"/g,'&quot;')}">
                        <label>Étiquettes</label>
                        <div class="label-picker" id="labelPicker">${
                            ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#6366f1','#ec4899','#78716c'].map(function(cl){
                                var sel = (c.labels||[]).indexOf(cl)>=0?' selected':'';
                                return '<div class="lp-item'+sel+'" style="background:'+cl+'" onclick="this.classList.toggle(\'selected\')" data-color="'+cl+'"></div>';
                            }).join('')
                        }</div>
                        <div class="modal-btns">
                            <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
                            <button type="submit" class="btn-primary">Enregistrer</button>
                        </div>
                    </form>
                </div>
            `);
        });
}
function saveCard(e, colId, cardId) {
    e.preventDefault();
    var fd = new FormData(e.target);
    var labels = Array.from(document.querySelectorAll('#labelPicker .lp-item.selected')).map(function(el){return el.dataset.color});
    var data = {col_id:colId, card_id:cardId, title:fd.get('title'), description:fd.get('description'), assignee:fd.get('assignee'), labels:labels};
    fetch('/api/board/%%BOARD_ID%%/cards', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
        .then(function(r){return r.json()})
        .then(function(d){if(d.success) location.reload(); else alert(d.error);});
    return false;
}
function deleteCard(colId, cardId) {
    if(!confirm('Supprimer cette carte ?')) return;
    fetch('/api/board/%%BOARD_ID%%/cards', {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({col_id:colId, card_id:cardId})})
        .then(function(r){return r.json()})
        .then(function(d){if(d.success) location.reload();});
}
function openAddColumn() {
    openModal(`
        <div class="board-modal">
            <h3>Nouvelle colonne</h3>
            <form onsubmit="return addColumn(event)">
                <label>Nom</label>
                <input type="text" name="name" required placeholder="Ex: En cours" autofocus>
                <label>Couleur</label>
                <div class="label-picker">${
                    ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#6366f1','#ec4899','#78716c'].map(function(c){
                        return '<div class="lp-item" style="background:'+c+'" onclick="var p=document.querySelectorAll(\'#colPicker .lp-item\');p.forEach(function(e){e.classList.remove(\'selected\')});this.classList.add(\'selected\')" data-color="'+c+'" id="colPicker"></div>';
                    }).join('')
                }</div>
                <div class="modal-btns">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-primary">Ajouter</button>
                </div>
            </form>
        </div>
    `);
}
function addColumn(e) {
    e.preventDefault();
    var fd = new FormData(e.target);
    var colorEl = document.querySelector('#colPicker.selected');
    var color = colorEl ? colorEl.dataset.color : '#6366f1';
    fetch('/api/board/%%BOARD_ID%%/columns', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:fd.get('name'), color:color})})
        .then(function(r){return r.json()})
        .then(function(d){if(d.success) location.reload();});
    return false;
}
function editColumn(colId) {
    fetch('/api/board/%%BOARD_ID%%/column?col_id='+colId)
        .then(function(r){return r.json()})
        .then(function(c) {
            openModal(`
                <div class="board-modal">
                    <h3>Renommer la colonne</h3>
                    <form onsubmit="return saveColumn(event,'${colId}')">
                        <label>Nom</label>
                        <input type="text" name="name" value="${c.name.replace(/"/g,'&quot;')}" required autofocus>
                        <div class="modal-btns">
                            <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
                            <button type="submit" class="btn-primary">Enregistrer</button>
                        </div>
                    </form>
                </div>
            `);
        });
}
function saveColumn(e, colId) {
    e.preventDefault();
    var fd = new FormData(e.target);
    fetch('/api/board/%%BOARD_ID%%/columns', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({col_id:colId, name:fd.get('name')})})
        .then(function(r){return r.json()})
        .then(function(d){if(d.success) location.reload();});
    return false;
}
</script>
<div id="boardModal" class="board-modal-bg" onclick="if(event.target===this)closeModal()"></div>
